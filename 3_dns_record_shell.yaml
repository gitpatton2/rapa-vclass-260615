# =====================================================================
#  방식 B) 셸 모드 (ansible.windows.win_shell + DnsServer cmdlet)
#    - 명령형/비멱등: Add-* 는 이미 있으면 에러 -> 재실행 시 실패(ignore_errors 로 무시)
#    - 항상 changed 로 보고, 값 변경 감지/갱신 없음
#    - 대신 임의 PowerShell 을 자유롭게 실행 가능(모듈에 없는 작업)
#  실행:  ansible-playbook -i 3_inventory.yaml 3_dns_record_shell.yaml   (실행 시 비밀번호 입력)
#         또는  WIN_PASSWORD='VMware123!' ansible-playbook -i 3_inventory.yaml 3_dns_record_shell.yaml
# =====================================================================
---
- name: Add Forward/Reverse DNS Records (shell mode)
  hosts: dc_svrs
  gather_facts: false
  vars_prompt:
    - name: win_password
      prompt: "Windows 비밀번호를 입력하세요 (administrator)"
      private: true
      unsafe: true
  vars:
    DNS_Records:
      - { name: k8s-api,     ip: 10.10.10.10 }
      - { name: k8s-proxy-1, ip: 10.10.10.11 }
      - { name: k8s-proxy-2, ip: 10.10.10.12 }
      - { name: k8s-cp-1,    ip: 10.10.10.21 }
      - { name: k8s-cp-2,    ip: 10.10.10.22 }
      - { name: k8s-cp-3,    ip: 10.10.10.23 }

  tasks:
    - name: Add A and PTR records via DnsServer cmdlets
      ansible.windows.win_shell: |
        Add-DnsServerResourceRecordA   -Name '{{ item.name }}' -ZoneName 'vclass.local' -IPv4Address '{{ item.ip }}'
        Add-DnsServerResourceRecordPtr -Name '{{ item.ip.split('.')[-1] }}' -ZoneName '10.10.10.in-addr.arpa' -PtrDomainName '{{ item.name }}.vclass.local'
      loop: "{{ DNS_Records }}"
      ignore_errors: true
