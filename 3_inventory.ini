# =====================================================================
#  Windows DC 인벤토리 - INI 형식
#  setup-ansible-control-node.sh 로 구성한 psrp(HTTPS/5986) 환경에 맞춤
# =====================================================================
[dc_svrs]
dc ansible_host=dc.vclass.local

[dc_svrs:vars]
ansible_user=administrator
# 비밀번호: 플레이북 vars_prompt(win_password) 우선, 없으면 환경변수 WIN_PASSWORD
#   - 프롬프트:  ansible-playbook -i 3_inventory.ini 3_dns_record_module.yaml
#   - 환경변수:  WIN_PASSWORD='VMware123!' ansible-playbook -i 3_inventory.ini 3_dns_record_module.yaml
ansible_password={{ win_password | default(lookup('env', 'WIN_PASSWORD')) }}

ansible_connection=psrp
ansible_port=5986
ansible_psrp_protocol=https
ansible_psrp_auth=negotiate

# 서버 인증서 검증: vclass-Root-CA 신뢰 (cert_trust_path / ca_trust_path 둘 다 지정)
ansible_psrp_cert_validation=validate
ansible_psrp_cert_trust_path=/home/ubuntu/automation/certs/vclass-root-ca.pem
ansible_psrp_ca_trust_path=/home/ubuntu/automation/certs/vclass-root-ca.pem
