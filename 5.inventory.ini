[loadbalancers]
k8s-api-proxy-1 ansible_host=10.10.10.11
k8s-api-proxy-2 ansible_host=10.10.10.12

[control_plane]
k8s-cp-1 ansible_host=10.10.10.21
k8s-cp-2 ansible_host=10.10.10.22
k8s-cp-3 ansible_host=10.10.10.23

[k8s_cluster:children]
loadbalancers
control_plane

[k8s_cluster:vars]
ansible_user=ubuntu
ansible_ssh_pass={{ ssh_password | default(lookup('env', 'SSH_PASSWORD')) }}
ansible_become=true
ansible_become_method=sudo
ansible_become_pass={{ ssh_password | default(lookup('env', 'SSH_PASSWORD')) }}
ansible_python_interpreter=/usr/bin/python3

virtual_ip=10.10.10.10
pod_cidr=192.168.0.0/16
k8s_pkg_minor=v1.29
calico_version=v3.27.0
