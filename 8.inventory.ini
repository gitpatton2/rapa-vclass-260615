[control_plane]
k8s-cp-1 ansible_host=10.10.10.21
k8s-cp-2 ansible_host=10.10.10.22
k8s-cp-3 ansible_host=10.10.10.23

[workers]
k8s-worker-1 ansible_host=10.10.10.31
k8s-worker-2 ansible_host=10.10.10.32
k8s-worker-3 ansible_host=10.10.10.33

[k8s_nodes:children]
control_plane
workers

[k8s_nodes:vars]
ansible_user=ubuntu
ansible_ssh_pass={{ lookup('env', 'SSH_PASSWORD') }}
ansible_become=true
ansible_become_method=sudo
ansible_become_pass={{ lookup('env', 'SSH_PASSWORD') }}
ansible_python_interpreter=/usr/bin/python3

virtual_ip=10.10.10.10
pod_cidr=192.168.0.0/16
k8s_pkg_minor=v1.29
calico_version=v3.27.0
