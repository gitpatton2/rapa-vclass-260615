---
- name: Register DNS A records on Windows DC
  hosts: dc_svrs
  gather_facts: false
  collections:
    - ansible.windows
  vars:
    dns_zone: vclass.local
    dns_records:
      - name: k8s-api
        ip: 10.10.10.10
      - name: k8s-api-proxy-1
        ip: 10.10.10.11
      - name: k8s-api-proxy-2
        ip: 10.10.10.12
      - name: k8s-cp-1
        ip: 10.10.10.21
      - name: k8s-cp-2
        ip: 10.10.10.22
      - name: k8s-cp-3
        ip: 10.10.10.23
  tasks:
    - name: Ensure A record exists on DC
      ansible.windows.win_dns_record:
        zone: "{{ dns_zone }}"
        name: "{{ item.name }}"
        type: A
        # value: "{{ item.ip }}"
        state: absent
      loop: "{{ dns_records }}"
      loop_control:
        label: "{{ item.name }}.{{ dns_zone }}"
